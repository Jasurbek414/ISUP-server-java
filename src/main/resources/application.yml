server:
  port: 8090
logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    com.isup: DEBUG

spring:
  application:
    name: universal-isup-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/isup_db}
    username: ${SPRING_DATASOURCE_USERNAME:isup}
    password: ${SPRING_DATASOURCE_PASSWORD:isup_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

isup:
  tcp:
    port: ${ISUP_TCP_PORT:7660}
    boss-threads: 1
    worker-threads: 8
  sadp:
    port: ${SADP_UDP_PORT:37020}
    enabled: true
  allow-unknown-devices: ${ISUP_ALLOW_UNKNOWN_DEVICES:true}
  server-ip: ${ISUP_SERVER_IP:127.0.0.1}
  webhook:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    max-retries: 3
    retry-delay-ms: 5000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  admin:
    secret: ${ADMIN_SECRET:changeme123}
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:isup1234}
  alert:
    telegram:
      token: ${ALERT_TELEGRAM_TOKEN:}
      chat-id: ${ALERT_CHAT_ID:}
  event:
    retention-days: ${EVENT_RETENTION_DAYS:90}
    buffer:
      max-size: 10000
