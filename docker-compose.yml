services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml --protocol http2 run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - frontend
    networks:
      - isup-network

  frpc:
    image: snowdreamtech/frpc:latest
    restart: always
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml
    depends_on:
      - isup-server
    networks:
      - isup-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isup_db}
      POSTGRES_USER: ${POSTGRES_USER:-isup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isup_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isup} -d ${POSTGRES_DB:-isup_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - isup-network

  isup-server:
    build: .
    ports:
      - "${ISUP_TCP_PORT:-7660}:7660"
      - "${ISUP_TCP_PORT:-7660}:7660/udp"
      - "${ISUP_ALARM_PORT:-7661}:7661"
      - "${ISUP_ALARM_PORT:-7661}:7661/udp"
      - "${SADP_UDP_PORT:-37020}:37020/udp"
      - "${API_PORT:-8090}:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-isup_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-isup}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-isup_pass}
      ISUP_ALLOW_UNKNOWN_DEVICES: ${ALLOW_UNKNOWN_DEVICES:-true}
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      ALERT_TELEGRAM_TOKEN: ${ALERT_TELEGRAM_TOKEN:-}
      ALERT_CHAT_ID: ${ALERT_CHAT_ID:-}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      ISUP_SERVER_IP: 192.168.1.35
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8090/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - isup-network

  frontend:
    build: ./frontend-react
    ports:
      - "8888:80"
    depends_on:
      - isup-server
    restart: always
    networks:
      - isup-network

  db-backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-isup_pass}
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c '
        while true; do
          sleep $$(( $(date -d "tomorrow 03:00" +%s 2>/dev/null || date -v+1d -j -f "%H:%M:%S" "03:00:00" +%s 2>/dev/null || echo $(($(date +%s) + 86400))) - $(date +%s) ))
          pg_dump -h postgres -U ${POSTGRES_USER:-isup} ${POSTGRES_DB:-isup_db} > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql
          find /backups -name "backup_*.sql" -mtime +7 -delete
          echo "Backup completed at $$(date)"
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - isup-network

volumes:
  postgres_data:

networks:
  isup-network:
    driver: bridge
